name: Build QMK Firmware

on:
  push:
    branches: [ main ]
    paths:
      - 'FIRMWARE/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone QMK firmware
        run: |
          git clone --depth 1 https://github.com/qmk/qmk_firmware.git
          cd qmk_firmware
          git submodule update --init --recursive --depth 1

      - name: Install QMK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            dfu-util \
            make
          python3 -m pip install --upgrade pip
          pip3 install qmk

      - name: Copy keyboard into QMK
        run: |
          mkdir -p qmk_firmware/keyboards/gabs_hackpad/keymaps/default
          cp FIRMWARE/config.h        qmk_firmware/keyboards/gabs_hackpad/
          cp FIRMWARE/rules.mk        qmk_firmware/keyboards/gabs_hackpad/
          cp FIRMWARE/info.json       qmk_firmware/keyboards/gabs_hackpad/
          cp FIRMWARE/gabs_hackpad.h  qmk_firmware/keyboards/gabs_hackpad/
          cp FIRMWARE/oled_display.c  qmk_firmware/keyboards/gabs_hackpad/
          cp FIRMWARE/oled_display.h  qmk_firmware/keyboards/gabs_hackpad/
          cp FIRMWARE/keymap.c        qmk_firmware/keyboards/gabs_hackpad/keymaps/default/

      - name: Compile firmware
        run: |
          cd qmk_firmware
          make gabs_hackpad:default

      - name: Find and upload firmware
        run: |
          echo "=== Searching for build output ==="
          find qmk_firmware -name "*.uf2" 2>/dev/null
          find qmk_firmware -name "*.hex" 2>/dev/null
          find qmk_firmware -name "*.bin" 2>/dev/null
          mkdir -p artifacts
          # Try uf2 first, then hex, then bin
          if find qmk_firmware -name "*.uf2" | grep -q .; then
            find qmk_firmware -name "*.uf2" -exec cp {} artifacts/gabs_hackpad.uf2 \;
          elif find qmk_firmware -name "*.hex" | grep -q .; then
            find qmk_firmware -name "*.hex" -exec cp {} artifacts/gabs_hackpad.hex \;
          else
            find qmk_firmware -name "*.bin" -exec cp {} artifacts/gabs_hackpad.bin \;
          fi
          ls -lh artifacts/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: gabs_hackpad_firmware
          path: artifacts/
          retention-days: 30
